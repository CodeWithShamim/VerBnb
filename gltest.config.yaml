# gltest configuration for Verdix / VerBnb
# Root keys: networks, paths, environment.
# localnet / studionet are preconfigured networks - we only override what we
# need. Env vars (${...}) are read from the `environment` file.

environment: .env

paths:
  contracts: contracts
  artifacts: artifacts

networks:
  default: studionet

  localnet:

  # Preconfigured: url https://studio.genlayer.com/api (chain id 61999) and
  # auto-generated accounts (studionet auto-funds them) - no overrides needed.
  # gltest requires a mapping here ({} inherits all preconfigured values).
  studionet: {}
